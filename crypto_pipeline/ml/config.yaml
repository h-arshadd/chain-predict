# crypto_pipeline/ml/config.yaml
#
# Single config file for the whole ML module. Everything -- data
# collection, feature engineering, sentiment, target generation, feature
# selection, train/test split, preprocessing, model training, signal
# generation, evaluation -- is controlled from here. There is only one
# entry point (ml/main.py) and only one config file.

model_type: regression # regression | classification | timeseries

# ---------------------------------------------------------------------
# Data Prep stages (market data, features, sentiment, target)
# ---------------------------------------------------------------------

data:
  enabled: true
  calculate_ohlcv: true  # Set to false to skip OHLCV calculation (use features only)
  symbol: btc
  exchange: binance
  timeframe: 1h
  start_date: "2024-01-01"
  end_date: "2026-01-01"

features:
  enabled: true  # If true, add indicators + patterns. If false, use raw OHLCV only.
  indicators:
    EMA:
      - parameters:
          period: 20
        aliases:
          ema: ind_EMA_20
      - parameters:
          period: 50
        aliases:
          ema: ind_EMA_50
    RSI:
      - parameters:
          period: 14
        aliases:
          value: ind_RSI_14
    MACD:
      - parameters:
          fastperiod: 12
          slowperiod: 26
          signalperiod: 9
        aliases:
          macd: ind_MACD_12_26_9
          signal: ind_MACD_SIGNAL_12_26_9
          histogram: ind_MACD_HIST_12_26_9
  patterns:
    DOJI:
      aliases:
        pattern: pat_DOJI
    ENGULFING:
      aliases:
        pattern: pat_ENGULFING

  # --- Feature Selection stage (PDF heading 2) ---
  # timestamp_column / target_column identify the dataset's timestamp and
  # label columns for every downstream stage.
  timestamp_column: datetime
  target_column: target

  # Option A: explicit list (order preserved, wins if set)
  # feature_columns:
  #   - ind_RSI_14
  #   - ind_EMA_20

  # Option B: prefix-based (used if feature_columns is not set)
  include_prefixes:
    - ind_
    - pat_
    - sen_

  # Extra columns to append after the prefix-resolved features (or after
  # an explicit feature_columns list, if set). Order-preserved, appended
  # at the end. Must exist in the dataset or feature_selector raises.
  feature_columns_extra:
    - close
    - volume

sentiment:
  enabled: false  # Set to false to skip sentiment collection
  source:
    - reddit
  encoding: numerical  # numerical (-1/0/1) | onehot

target:
  # regression -> log return (future close vs current close)
  # classification -> Triple Barrier Labeling: -1/0/1 based on whether price
  # hits the upper (take-profit) or lower (stop-loss) barrier first within
  # `horizon` candles. Neither hit within horizon -> 0.
  horizon: 4
  upper_threshold: 0.001   # % above entry to count as "up" (take-profit)
  lower_threshold: -0.001  # % below entry to count as "down" (stop-loss)
  filter_noise: true       # regression only
  noise_threshold: 0.001   # regression only

# ---------------------------------------------------------------------
# ML stages (split, preprocessing, model, signals, evaluation)
# ---------------------------------------------------------------------

output:
  save_debug_csv: false
  base_dir: outputs

# Train/Test Split stage (PDF heading 3).
# Time series -- chronological cutoff only, never shuffled/random.
# test_size is the fraction of rows (by time order) held out for test,
# taken from the END of the dataset. Everything before that cutoff is
# train.
split:
  test_size: 0.2

# Data Preprocessing stage (PDF heading 4).
# Steps run in order, each one chained into the next -- e.g. the PDF's
# own example: Raw Features -> Fractional Differencing -> RobustScaler.
# Every step's params are fit on the train split ONLY, then the same
# fitted transform is applied to the test split (see preprocessing_pipeline.py).
# Leave "steps" empty ([]) to pass features through unchanged.
# Model Training stage (PDF headings 5, 6 & 7).
# algorithm must be a key in the registry that matches model_type above:
#   model_type=regression     -> ml/regressors/registry.py's REGRESSORS
#                                 (linear_regression, ridge, lasso, elasticnet,
#                                 random_forest, extra_trees, svr, xgboost,
#                                 lightgbm, catboost)
#                              -> or ml/deep_learning/registry.py's DL_REGRESSORS
#                                 (mlp, lstm, gru) if using a deep learning
#                                 model instead
#   model_type=classification -> ml/classifiers/registry.py's CLASSIFIERS
#                                 (logistic_regression, decision_tree,
#                                 random_forest, extra_trees, svm, knn,
#                                 naive_bayes, xgboost, lightgbm, catboost)
#                              -> or ml/deep_learning/registry.py's DL_CLASSIFIERS
#                                 (mlp, lstm, gru) if using a deep learning
#                                 model instead
#   model_type=timeseries     -> ml/timeseries/registry.py's TS_MODELS
#                                 (nbeats, tcn) -- Darts-backed, every model
#                                 in this family forecasts the target series
#                                 n steps ahead (not a per-row
#                                 regression/classification prediction).
#                                 Requires input_chunk_length and
#                                 output_chunk_length in params (every
#                                 Darts model in this family needs both).
# params are forwarded as-is to the underlying estimator's constructor --
# nothing here is validated/hardcoded per-algorithm, so any param that
# estimator accepts can go in params. Only one model runs per run, chosen
# by whichever of regression_pipeline.py / classification_pipeline.py /
# timeseries_pipeline.py matches model_type above (see those files).
#
# model.algorithms is a dict keyed by model_type, not a flat list --
# {regression: [...], classification: [...], timeseries: [...]}. Keyed
# this way on purpose: model_type (above) can change independently, and
# a flat list would silently be the wrong algorithms (or error out
# confusingly) the moment you switch model_type without also rewriting
# the list by hand. With a key per model_type, all three are always
# ready -- switching model_type just picks a different key below,
# nothing else to edit.
#
# model.algorithms.<current model_type> is REQUIRED and must be
# non-empty -- it's the only thing that decides what trains this run.
# There's no "leave it unset -> run everything registered" behavior:
# main.py raises a clear error naming what's available for the current
# model_type if the matching key is missing or empty. This is
# deliberate -- it used to default to "every algorithm registered",
# which silently trained mlp (and, before it moved to timeseries,
# lstm/gru) even when you never asked for a deep learning model, just
# because it happened to be registered.
#
# Available per model_type:
#   regression     -> ml/regressors/registry.py's REGRESSORS
#                      (linear_regression, ridge, lasso, elasticnet,
#                      random_forest, extra_trees, svr, xgboost,
#                      lightgbm, catboost)
#                      + ml/deep_learning/registry.py's DL_REGRESSORS
#                      (mlp, lstm, gru)
#   classification -> ml/classifiers/registry.py's CLASSIFIERS
#                      (logistic_regression, decision_tree, random_forest,
#                      extra_trees, svm, knn, naive_bayes, xgboost,
#                      lightgbm, catboost)
#                      + ml/deep_learning/registry.py's DL_CLASSIFIERS
#                      (mlp, lstm, gru)
#   timeseries     -> ml/timeseries/registry.py's TS_MODELS
#                      (nbeats, tcn)
#
# Only the list matching model_type above is used; the other two just
# sit here ready for next time you switch. Edit any list to whatever
# subset you actually want -- e.g. leave mlp/lstm/gru commented out if
# you don't want deep learning training alongside sklearn models.
#
model:
  algorithms:
    regression:
      - linear_regression
      - ridge
      - lasso
      - elasticnet
      - random_forest
      - extra_trees
      - svr
      - xgboost
      - lightgbm
      - catboost
      # - mlp    # uncomment to include the deep learning regressor in this run
      # - lstm   # uncomment to include the deep learning regressor in this run
      # - gru    # uncomment to include the deep learning regressor in this run

    classification:
      - logistic_regression
      - decision_tree
      - random_forest
      - extra_trees
      - svm
      - knn
      - naive_bayes
      - xgboost
      - lightgbm
      - catboost
      # - mlp    # uncomment to include the deep learning classifier in this run
      # - lstm   # uncomment to include the deep learning classifier in this run
      # - gru    # uncomment to include the deep learning classifier in this run

    timeseries:
      - nbeats
      - tcn

# param_overrides is nested by model_type, then by algorithm --
# param_overrides.<model_type>.<algorithm> -- NOT a flat {algorithm: {...}}
# dict. This matters because several algorithm names are shared between
# regression and classification (random_forest, extra_trees, xgboost,
# lightgbm, catboost), and sklearn's own defaults for those differ by
# task (e.g. RandomForestRegressor's default max_features is 1.0,
# RandomForestClassifier's is "sqrt") -- a flat dict couldn't hold both
# at once. Every algorithm below has EVERY one of its constructor's
# tunable params spelled out explicitly, set to that library's own
# default value -- nothing is left for sklearn/xgboost/lightgbm/catboost
# to fill in silently. sklearn's values here were read directly from
# each class's __init__ signature (sklearn 1.8). xgboost/lightgbm/
# catboost aren't installed in this environment so their values below
# are the well-documented standard defaults for the params people
# actually tune, not introspected -- if you're on a very different
# library version, worth a quick diff against that version's docs.
# Any algorithm not listed here just uses its model class's own
# defaults (empty dict) -- but since every enabled algorithm IS listed
# here now, that fallback shouldn't trigger for anything you actually run.
# timeseries algorithms (nbeats/tcn) additionally REQUIRE
# output_chunk_length; there's no library default for that.
  param_overrides:
    regression:
      linear_regression:
        fit_intercept: true
        copy_X: true
        tol: 1.0e-6
        n_jobs: null
        positive: false
      ridge:
        alpha: 1.0
        fit_intercept: true
        copy_X: true
        max_iter: null
        tol: 1.0e-4
        solver: auto
        positive: false
        random_state: null
      lasso:
        alpha: 1.0
        fit_intercept: true
        precompute: false
        copy_X: true
        max_iter: 1000
        tol: 1.0e-4
        warm_start: false
        positive: false
        random_state: null
        selection: cyclic
      elasticnet:
        alpha: 1.0
        l1_ratio: 0.5
        fit_intercept: true
        precompute: false
        max_iter: 1000
        copy_X: true
        tol: 1.0e-4
        warm_start: false
        positive: false
        random_state: null
        selection: cyclic
      random_forest:
        n_estimators: 100
        criterion: squared_error
        max_depth: null
        min_samples_split: 2
        min_samples_leaf: 1
        min_weight_fraction_leaf: 0.0
        max_features: 1.0
        max_leaf_nodes: null
        min_impurity_decrease: 0.0
        bootstrap: true
        oob_score: false
        n_jobs: null
        random_state: 42
        verbose: 0
        warm_start: false
        ccp_alpha: 0.0
        max_samples: null
      extra_trees:
        n_estimators: 100
        criterion: squared_error
        max_depth: null
        min_samples_split: 2
        min_samples_leaf: 1
        min_weight_fraction_leaf: 0.0
        max_features: 1.0
        max_leaf_nodes: null
        min_impurity_decrease: 0.0
        bootstrap: false
        oob_score: false
        n_jobs: null
        random_state: 42
        verbose: 0
        warm_start: false
        ccp_alpha: 0.0
        max_samples: null
      svr:
        kernel: rbf
        degree: 3
        gamma: scale
        coef0: 0.0
        tol: 1.0e-3
        C: 1.0
        epsilon: 0.1
        shrinking: true
        cache_size: 200
        verbose: false
        max_iter: -1
      xgboost:
        n_estimators: 100
        max_depth: 6
        learning_rate: 0.3
        subsample: 1.0
        colsample_bytree: 1.0
        gamma: 0.0
        min_child_weight: 1
        reg_alpha: 0.0
        reg_lambda: 1.0
        objective: "reg:squarederror"
        booster: gbtree
        random_state: 42
        n_jobs: null
        verbosity: 1
      lightgbm:
        boosting_type: gbdt
        num_leaves: 31
        max_depth: -1
        learning_rate: 0.1
        n_estimators: 100
        subsample: 1.0
        colsample_bytree: 1.0
        reg_alpha: 0.0
        reg_lambda: 0.0
        min_child_samples: 20
        random_state: 42
        n_jobs: null
        verbose: -1
      catboost:
        iterations: 1000
        learning_rate: null   # null = CatBoost picks it automatically from the data
        depth: 6
        l2_leaf_reg: 3.0
        loss_function: RMSE
        random_seed: 42
        verbose: false
        allow_writing_files: false

    classification:
      logistic_regression:
        C: 1.0
        dual: false
        tol: 1.0e-4
        fit_intercept: true
        intercept_scaling: 1
        class_weight: null
        random_state: 42
        solver: lbfgs
        max_iter: 100
        verbose: 0
        warm_start: false
        n_jobs: null
      decision_tree:
        criterion: gini
        splitter: best
        max_depth: null
        min_samples_split: 2
        min_samples_leaf: 1
        min_weight_fraction_leaf: 0.0
        max_features: null
        random_state: 42
        max_leaf_nodes: null
        min_impurity_decrease: 0.0
        class_weight: null
        ccp_alpha: 0.0
      random_forest:
        n_estimators: 100
        criterion: gini
        max_depth: null
        min_samples_split: 2
        min_samples_leaf: 1
        min_weight_fraction_leaf: 0.0
        max_features: sqrt
        max_leaf_nodes: null
        min_impurity_decrease: 0.0
        bootstrap: true
        oob_score: false
        n_jobs: null
        random_state: 42
        verbose: 0
        warm_start: false
        class_weight: null
        ccp_alpha: 0.0
        max_samples: null
      extra_trees:
        n_estimators: 100
        criterion: gini
        max_depth: null
        min_samples_split: 2
        min_samples_leaf: 1
        min_weight_fraction_leaf: 0.0
        max_features: sqrt
        max_leaf_nodes: null
        min_impurity_decrease: 0.0
        bootstrap: false
        oob_score: false
        n_jobs: null
        random_state: 42
        verbose: 0
        warm_start: false
        class_weight: null
        ccp_alpha: 0.0
        max_samples: null
      svm:
        C: 1.0
        kernel: rbf
        degree: 3
        gamma: scale
        coef0: 0.0
        shrinking: true
        probability: true   # library default is false; this pipeline needs predict_proba()
        tol: 1.0e-3
        cache_size: 200
        class_weight: null
        verbose: false
        max_iter: -1
        decision_function_shape: ovr
        break_ties: false
        random_state: 42
      knn:
        n_neighbors: 5
        weights: uniform
        algorithm: auto
        leaf_size: 30
        p: 2
        metric: minkowski
        metric_params: null
        n_jobs: null
      naive_bayes:
        priors: null
        var_smoothing: 1.0e-9
      xgboost:
        n_estimators: 100
        max_depth: 6
        learning_rate: 0.3
        subsample: 1.0
        colsample_bytree: 1.0
        gamma: 0.0
        min_child_weight: 1
        reg_alpha: 0.0
        reg_lambda: 1.0
        objective: "binary:logistic"   # switch to "multi:softprob" yourself for >2 classes
        booster: gbtree
        random_state: 42
        n_jobs: null
        verbosity: 1
      lightgbm:
        boosting_type: gbdt
        num_leaves: 31
        max_depth: -1
        learning_rate: 0.1
        n_estimators: 100
        subsample: 1.0
        colsample_bytree: 1.0
        reg_alpha: 0.0
        reg_lambda: 0.0
        min_child_samples: 20
        random_state: 42
        n_jobs: null
        verbose: -1
      catboost:
        iterations: 1000
        learning_rate: null   # null = CatBoost picks it automatically from the data
        depth: 6
        l2_leaf_reg: 3.0
        loss_function: Logloss   # switch to "MultiClass" yourself for >2 classes
        random_seed: 42
        verbose: false
        allow_writing_files: false

    timeseries:
      nbeats:
        input_chunk_length: 48   # how many past steps the model looks at
        output_chunk_length: 12  # how many future steps it predicts (= forecast horizon n)
        n_epochs: 50
        batch_size: 32
        random_state: 42
      tcn:
        input_chunk_length: 48
        output_chunk_length: 12
        n_epochs: 50
        batch_size: 32
        random_state: 42
  # TCN alternative -- swap the block above for this if algorithm: tcn
  # instead of nbeats. Both are Darts-backed and support past_covariates
  # natively (see ml/timeseries/tcn_model.py).
  # algorithm: tcn
  # params:
  #   input_chunk_length: 48
  #   output_chunk_length: 12
  #   kernel_size: 3
  #   num_filters: 32
  #   dilation_base: 2
  #   num_layers: null
  #   dropout: 0.2
  #   n_epochs: 50
  #   batch_size: 32
  #   random_state: 42

  # Traditional regressor example (ml/regressors/registry.py) -- use if
  # model_type: regression instead of timeseries.
  # algorithm: random_forest
  # params:
  #   n_estimators: 200
  #   max_depth: 8
  #   random_state: 42

  # Deep learning example (ml/deep_learning/registry.py) -- swap the
  # block above for this if algorithm is "mlp", "lstm", or "gru" instead
  # of a traditional sklearn-style algorithm. All keys are read by
  # base_network.py's BaseNetwork/BaseClassifierNetwork; see that file's
  # docstring for the full list. hidden_units is a per-layer list for
  # mlp, but a single int (hidden_size) for lstm/gru -- see
  # ml/deep_learning/lstm.py / gru.py's docstrings.
  # algorithm: mlp  # or: lstm, gru
  # params:
  #   hidden_layers: 2
  #   hidden_units: 64
  #   activation: relu
  #   dropout: 0.2
  #   batch_norm: false
  #   optimizer: adam
  #   learning_rate: 0.001
  #   scheduler: reduce_on_plateau
  #   scheduler_params:
  #     patience: 5
  #   batch_size: 32
  #   epochs: 50
  #   early_stopping_patience: 10
  #   random_seed: 42

preprocessing:
  steps:
    - method: fractional_differencing
      params:
        d: 0.2
        threshold: 1.0e-3
    - method: robust_scaler
      params: {}

# Signal Generation stage (PDF heading 9).
# Converts predictor.generate_predictions()'s output (or, for timeseries,
# predictor.generate_timeseries_predictions()'s forecast path) into
# Buy/Sell/Hold labels (ml/signals/regression_signals.py,
# classification_signals.py, or timeseries_signals.py, whichever matches
# model_type above -- same routing pattern as the model section above).
# Thresholds are the ONLY thing configurable here; the Buy/Sell/Hold
# comparison logic itself lives in signal_utils.py and is never touched
# by config.
signals:
  # Used by ml/signals/regression_signals.py.
  # predicted return > buy_threshold  -> Buy
  # predicted return < sell_threshold -> Sell
  # otherwise                         -> Hold
  regression:
    buy_threshold: 0.002
    sell_threshold: -0.002

  # Used by ml/signals/classification_signals.py.
  # bullish_class/bearish_class must match the actual label values in
  # your target column -- the target section above's triple-barrier
  # target encodes -1 (down) / 0 (neutral) / 1 (up), so 1/-1 are the
  # defaults here.
  # bullish probability > bullish_threshold -> Buy
  # bearish probability > bearish_threshold -> Sell
  # otherwise                               -> Hold
  classification:
    bullish_class: 1
    bearish_class: -1
    bullish_threshold: 0.6
    bearish_threshold: 0.6

  # Used by ml/signals/timeseries_signals.py. A timeseries model
  # forecasts a whole path (n steps ahead), not one return/probability
  # per row -- this is thresholded on the % change from the last known
  # close to the FINAL forecasted step (see timeseries_signals.py).
  # predicted % change > buy_threshold  -> Buy
  # predicted % change < sell_threshold -> Sell
  # otherwise                           -> Hold
  timeseries:
    buy_threshold: 0.002
    sell_threshold: -0.002

# Model Evaluation stage (PDF heading 10).
# Used by ml/evaluation/evaluator.py's select_best_model() when comparing
# several runs -- picks which trading_metrics key decides the "best" model.
# ML metrics (MAE/accuracy/etc.) are never used for this, only this metric.
# Supported values: total_return, sharpe_ratio, sortino_ratio, calmar_ratio,
# max_drawdown, profit_factor, win_rate.
evaluation:
  primary_metric: sharpe_ratio