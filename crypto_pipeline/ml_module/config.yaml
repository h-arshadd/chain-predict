# crypto_pipeline/ml_module/config.yaml

model_type: regression  # regression | classification | timeseries

data:
  enabled: true
  calculate_ohlcv: true  # Set to false to skip OHLCV calculation (use features only)
  symbol: btc
  exchange: binance
  timeframe: 1h
  start_date: "2025-01-01"
  end_date: "2026-01-01"

features:
  enabled: true  # If true, add indicators + patterns. If false, use raw OHLCV only.
  indicators:
    EMA:
      - parameters:
          period: 20
        aliases:
          ema: ind_EMA_20
      - parameters:
          period: 50
        aliases:
          ema: ind_EMA_50
    RSI:
      - parameters:
          period: 14
        aliases:
          value: ind_RSI_14
    MACD:
      - parameters:
          fastperiod: 12
          slowperiod: 26
          signalperiod: 9
        aliases:
          macd: ind_MACD_12_26_9
          signal: ind_MACD_SIGNAL_12_26_9
          histogram: ind_MACD_HIST_12_26_9
  patterns:
    DOJI:
      aliases:
        pattern: pat_DOJI
    ENGULFING:
      aliases:
        pattern: pat_ENGULFING

sentiment:
  enabled: true  # Set to false to skip sentiment collection
  source:
    - reddit
  encoding: numerical  # numerical (-1/0/1) | onehot

target:
  type: return  # regression: return | log_return
                # classification: binary | threshold
  horizon: 1
  filter_noise: true
  noise_method: threshold  # threshold | zscore | quantile
  noise_threshold: 0.001