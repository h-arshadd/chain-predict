# crypto_pipeline/ml_module/config.yaml

model_type: regression

data:
  enabled: true
  symbol: BTCUSDT
  exchange: BINANCE
  timeframe: 15m
  start_date: "2020-01-01"
  end_date: "2024-12-31"

features:
  enabled: true
  indicators:
    EMA:
      - parameters:
          period: 20
        aliases:
          ema: ind_EMA_20
      - parameters:
          period: 50
        aliases:
          ema: ind_EMA_50
    RSI:
      - parameters:
          period: 14
        aliases:
          value: ind_RSI_14
    MACD:
      - parameters:
          fast: 12
          slow: 26
          signal: 9
        aliases:
          macd: ind_MACD_12_26_9
          signal: ind_MACD_SIGNAL_12_26_9
          histogram: ind_MACD_HIST_12_26_9
  patterns:
    DOJI:
      aliases:
        pattern: pat_DOJI
    BULLISH_ENGULFING:
      aliases:
        pattern: pat_BULLISH_ENGULFING

sentiment:
  enabled: false
  source:
    - twitter
    - news
  encoding: numerical

target:
  type: return
  horizon: 1
  filter_noise: true
  noise_method: threshold
  noise_threshold: 0.001