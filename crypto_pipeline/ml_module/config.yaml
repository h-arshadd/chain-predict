# crypto_pipeline/ml_module/config.yaml

model_type: regression

data:
  enabled: true
  symbol: btc
  exchange: binance
  timeframe: 15m
  start_date: "2025-01-01"
  end_date: "2026-01-01"

features:
  enabled: true
  indicators:
    EMA:
      - parameters:
          period: 20
        aliases:
          ema: ind_EMA_20
      - parameters:
          period: 50
        aliases:
          ema: ind_EMA_50
    RSI:
      - parameters:
          period: 14
        aliases:
          value: ind_RSI_14
    MACD:
      - parameters:
          fastperiod: 12
          slowperiod: 26
          signalperiod: 9
        aliases:
          macd: ind_MACD_12_26_9
          signal: ind_MACD_SIGNAL_12_26_9
          histogram: ind_MACD_HIST_12_26_9
  patterns:
    DOJI:
      aliases:
        pattern: pat_DOJI
    ENGULFING:
      aliases:
        pattern: pat_ENGULFING

sentiment:
  enabled: true
  source:
    - reddit
  encoding: numerical

target:
  type: return
  horizon: 1
  filter_noise: true
  noise_method: threshold
  noise_threshold: 0.001