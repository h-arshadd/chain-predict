# ============================================================
# Simulator Configuration
# ============================================================

# Starting account balance
initial_balance: 10000

# ------------------------------------------------------------
# Position Sizing
# ------------------------------------------------------------
position_size:
  type: fixed_percentage
  value: 10        # Percentage of current balance

# ------------------------------------------------------------
# Trading Costs
# ------------------------------------------------------------
commission: 0.05  # Percentage of trade value (0.05 = 0.05%)
slippage: 0.02    # Percentage of trade value (0.02 = 0.02%)

# ------------------------------------------------------------
# Trade Permissions
# ------------------------------------------------------------
allow_long: true
allow_short: true

# ------------------------------------------------------------
# Risk Management
# ------------------------------------------------------------
take_profit:
  type: percentage
  value: 2.0

stop_loss:
  type: percentage
  value: 1.0

# ------------------------------------------------------------
# Portfolio
# ------------------------------------------------------------
max_open_positions: 1