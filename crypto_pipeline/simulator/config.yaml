# ============================================================
# Simulator Configuration
# ============================================================

# ------------------------------------------------------------
# Universe
# ------------------------------------------------------------
# Exchanges and symbols (coins) the simulator runs every strategy against.
# Every (exchange, symbol, strategy) combination gets its own Position
# Table + Trade Ledger, so add/remove a coin or exchange just by editing
# these two lists -- nothing in main.py needs to change.
#
# Currently narrowed to binance/btc only (fast to iterate on while
# testing) -- add exchanges/coins back here whenever you want the full
# matrix again, e.g.:
#   exchanges: [binance, bybit]
#   symbols:   [doge, sol, btc, eth, ada, ltc, mina, sui]
exchanges:
  - binance

symbols:
  - btc

# ------------------------------------------------------------
# Data Range
# ------------------------------------------------------------

# Only used on the very first run of a given (exchange, symbol, strategy) --
# once a run has happened, saved state (last_processed, in
# simulator.{exchange}_{symbol}_{strategy}_state) takes over and this is
# ignored. Set to the earliest date your DB actually has data for (no point
# asking further back than that). end_date is always "now" internally --
# simulator is live/ongoing, not a fixed window like backtest.
start_date: "2026-07-01"

# Starting account balance
initial_balance: 10000

# ------------------------------------------------------------
# Position Sizing
# ------------------------------------------------------------
position_size:
  type: fixed_percentage
  value: 10        # Percentage of current balance

# ------------------------------------------------------------
# Trading Costs
# ------------------------------------------------------------
commission: 0.05  # Percentage of trade value (0.05 = 0.05%)
slippage: 0.02    # Percentage of trade value (0.02 = 0.02%)

# ------------------------------------------------------------
# Trade Permissions
# ------------------------------------------------------------
allow_long: true
allow_short: true

# ------------------------------------------------------------
# Risk Management
# ------------------------------------------------------------
take_profit:
  type: percentage
  value: 2.0

stop_loss:
  type: percentage
  value: 1.0

# ------------------------------------------------------------
# Portfolio
# ------------------------------------------------------------
max_open_positions: 1