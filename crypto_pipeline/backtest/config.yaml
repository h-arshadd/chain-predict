# ============================================================
# Backtest Configuration
# ============================================================

# ------------------------------------------------------------
# Data Range
# ------------------------------------------------------------
# Same date range used to pull data for both signal generation and
# backtest execution. Pin end_date to the exact timestamp your DB
# already covers (instead of "now") so get_data() reads purely from
# the DB and never tries to live-fetch a gap from the exchange.
start_date: "2026-04-01"
end_date: "2026-06-01"

# Starting account balance
initial_balance: 10000

# ------------------------------------------------------------
# Position Sizing
# ------------------------------------------------------------
position_size:
  type: fixed_percentage
  value: 10        # Percentage of current balance

# ------------------------------------------------------------
# Trading Costs
# ------------------------------------------------------------
commission: 0.0005
slippage: 0.0002

# ------------------------------------------------------------
# Trade Permissions
# ------------------------------------------------------------
allow_long: true
allow_short: true

# ------------------------------------------------------------
# Risk Management
# ------------------------------------------------------------
take_profit:
  type: percentage
  value: 2.0

stop_loss:
  type: percentage
  value: 1.0

# ------------------------------------------------------------
# Execution
# ------------------------------------------------------------
entry_price: next_open
exit_price: next_open

# ------------------------------------------------------------
# Portfolio
# ------------------------------------------------------------
max_open_positions: 1