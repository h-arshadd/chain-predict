# ============================================================
# Backtest Configuration
# ============================================================

# Starting account balance
initial_balance: 10000

# ------------------------------------------------------------
# Position Sizing
# ------------------------------------------------------------
position_size:
  type: fixed_percentage
  value: 10        # Percentage of current balance

# ------------------------------------------------------------
# Trading Costs
# ------------------------------------------------------------
commission: 0.0005
slippage: 0.0002

# ------------------------------------------------------------
# Trade Permissions
# ------------------------------------------------------------
allow_long: true
allow_short: true

# ------------------------------------------------------------
# Risk Management
# ------------------------------------------------------------
take_profit:
  type: percentage
  value: 2.0

stop_loss:
  type: percentage
  value: 1.0

# ------------------------------------------------------------
# Execution
# ------------------------------------------------------------
entry_price: next_open
exit_price: next_open

# ------------------------------------------------------------
# Portfolio
# ------------------------------------------------------------
max_open_positions: 1