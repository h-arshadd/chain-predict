# PATTERNS:
#   - inputs:
#       - open
#       - high
#       - low
#       - close
#
#     parameters: {}
#
#     aliases:
#       doji: pat_DOJI
#       bullish_engulfing: pat_BULLISH_ENGULFING

SMA:
  - inputs:
      - close
    parameters:
      timeperiod: 20
    aliases:
      sma: ind_sma_20


# ============================================================================
# Strategy Configuration
# ============================================================================

strategy:

  long:

    rule: AND

    conditions:

      - left: ind_sma_20
        operator: cross_above
        right: close
        persist_bars: 0


  short:

    rule: AND

    conditions:

      - left: ind_sma_20
        operator: cross_below
        right: close
        persist_bars: 0

