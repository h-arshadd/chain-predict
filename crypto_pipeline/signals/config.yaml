# ============================================================================
# STRATEGY 2: RSI Overbought/Oversold - ACTIVE
# ============================================================================

strategy_name: "RSI_14_reversal"

RSI:
  - inputs:
      - close
    parameters:
      period: 14
    aliases:
      rsi: ind_RSI_14

strategy:

  long:

    rule: AND

    conditions:

      # RSI < 30 (oversold)
      - left: ind_RSI_14
        operator: "<"
        right: 30
        persist_bars: 0


  short:

    rule: AND

    conditions:

      # RSI > 70 (overbought)
      - left: ind_RSI_14
        operator: ">"
        right: 70
        persist_bars: 0

