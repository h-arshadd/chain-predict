# ============================================================================
# STRATEGY 08: Doji Reversal + RSI Filter
# Doji at an RSI extreme signals a potential reversal.
# ============================================================================

strategy_name: "doji_rsi_reversal"

time_horizon: "5min"

# TP/SL for this strategy (required -- every strategy sets its own,
# no shared default across strategies).
take_profit:
  type: percentage
  value: 2.0

stop_loss:
  type: percentage
  value: 1.0

RSI:
  - inputs:
      - close
    parameters:
      period: 14
    aliases:
      rsi: ind_RSI_14

PATTERNS:
  - inputs:
      - open
      - high
      - low
      - close
    parameters: {}
    aliases:
      doji: pat_DOJI

strategy:

  long:
    rule: AND
    conditions:
      - left: pat_DOJI
        operator: pattern_match
        right: true
        persist_bars: 0

      - left: ind_RSI_14
        operator: "<"
        right: 35
        persist_bars: 0

  short:
    rule: AND
    conditions:
      - left: pat_DOJI
        operator: pattern_match
        right: true
        persist_bars: 0

      - left: ind_RSI_14
        operator: ">"
        right: 65
        persist_bars: 0