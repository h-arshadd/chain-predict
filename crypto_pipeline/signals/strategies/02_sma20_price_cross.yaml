# ============================================================================
# STRATEGY 02: SMA 20 vs Price Cross
# Long when SMA20 crosses above price, Short when SMA20 crosses below price.
# ============================================================================

strategy_name: "SMA_20_price_cross"

time_horizon: "3min"

# TP/SL for this strategy (required -- every strategy sets its own,
# no shared default across strategies).
take_profit:
  type: percentage
  value: 2.0

stop_loss:
  type: percentage
  value: 1.0

SMA:
  - inputs:
      - close
    parameters:
      timeperiod: 20
    aliases:
      sma: ind_sma_20

strategy:

  long:
    rule: AND
    conditions:
      - left: ind_sma_20
        operator: cross_above
        right: close
        persist_bars: 0

  short:
    rule: AND
    conditions:
      - left: ind_sma_20
        operator: cross_below
        right: close
        persist_bars: 0