# ============================================================================
# STRATEGY 12: EMA 9/21 Fast Scalp Cross
# ============================================================================

strategy_name: "ema_9_21_fast_scalp"

time_horizon: "15min"

EMA:
  - inputs:
      - close
    parameters:
      period: 9
    aliases:
      ema: ind_EMA_9

  - inputs:
      - close
    parameters:
      period: 21
    aliases:
      ema: ind_EMA_21

strategy:

  long:
    rule: AND
    conditions:
      - left: ind_EMA_9
        operator: cross_above
        right: ind_EMA_21
        persist_bars: 0

  short:
    rule: AND
    conditions:
      - left: ind_EMA_9
        operator: cross_below
        right: ind_EMA_21
        persist_bars: 0